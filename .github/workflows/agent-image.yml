name: Publish Agent Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/agent-image.yml"
      - "apps/agent/**"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/synology-monitor-agent

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Verification gate (CI/CD rules §8/§11): build/publish only if vet + tests
      # pass, so a regression never reaches the production NASes (Watchtower only
      # deploys images this workflow publishes). The agent has no test files yet,
      # so this is currently a vet gate plus future-proofing for added tests.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Vet and test
        working-directory: apps/agent
        run: |
          go vet ./...
          go test ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Build and push agent image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/agent
          file: ./apps/agent/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
