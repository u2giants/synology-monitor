name: Publish NAS MCP Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nas-mcp-image.yml"
      - "apps/nas-mcp/**"
      # The tool catalog now lives in packages/shared (single source), reached
      # via the src/nas-tools.ts symlink — rebuild nas-mcp when it changes too.
      - "packages/shared/**"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/synology-monitor-nas-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Verification gate (CI/CD rules §8/§11), mirroring nas-api-image.yml: the
      # image is only built and published if the tests pass, so a regression that
      # compiles but fails tests never reaches the production NASes.
      #
      # This gate exists because nas-mcp ships the NAS tool catalog
      # (packages/shared/src/nas-tools.ts, reached via the src/nas-tools.ts symlink),
      # including tier-3 write tools that build shell commands from a caller-supplied
      # path. nas-tools.write-safety.test.ts is what keeps a shell-injection or
      # false-success regression out of that catalog — see the 2026-07-16 fix.
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install pnpm
        run: npm install -g pnpm@9

      - name: Install dependencies
        run: pnpm install --no-frozen-lockfile

      - name: Test shared tool catalog
        run: pnpm --filter @synology-monitor/shared run test

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Build and push NAS MCP image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/nas-mcp/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Coolify redeploy
        run: |
          curl -s -X GET \
            "http://178.156.180.212:8000/api/v1/deploy?uuid=efl17f5iocnz94840pexre9d&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
