name: Publish NAS MCP Image

on:
  push:
    branches:
      - master
    paths:
      - ".github/workflows/nas-mcp-image.yml"
      - "apps/nas-mcp/**"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/synology-monitor-nas-mcp

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Build and push NAS MCP image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/nas-mcp
          file: ./apps/nas-mcp/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Trigger Coolify redeploy
        run: |
          curl -s -X GET \
            "http://178.156.180.212:8000/api/v1/deploy?uuid=efl17f5iocnz94840pexre9d&force=false" \
            -H "Authorization: Bearer ${{ secrets.COOLIFY_TOKEN }}"
