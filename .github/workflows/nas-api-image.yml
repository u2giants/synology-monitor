name: Publish NAS API Image

on:
  push:
    branches:
      - main
    paths:
      - ".github/workflows/nas-api-image.yml"
      - "apps/nas-api/**"
      # The validator's tier-3 contract test classifies the commands the shared NAS
      # tool catalog generates, via this golden. Without this trigger the tier check
      # would sleep through exactly the change it guards: a nas-tools.ts edit that
      # regenerates the golden and silently reclassifies a user-data write.
      - "packages/shared/src/__fixtures__/nas-write-commands.golden.json"
  workflow_dispatch:

env:
  IMAGE_NAME: ghcr.io/${{ github.repository_owner }}/synology-monitor-nas-api

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Verification gate (CI/CD rules §8/§11): the image is only built and
      # published if vet + tests pass, so a regression that compiles but fails
      # tests never reaches the production NASes. Watchtower only deploys images
      # this workflow actually publishes, so a failed gate = no deploy.
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.23"

      - name: Vet and test
        working-directory: apps/nas-api
        run: |
          go vet ./...
          go test ./...

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract image metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha
            type=ref,event=branch

      - name: Build and push NAS API image
        uses: docker/build-push-action@v6
        with:
          context: ./apps/nas-api
          file: ./apps/nas-api/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BUILD_SHA=${{ github.sha }}
            BUILD_TIME=${{ github.event.head_commit.timestamp }}
